<!DOCTYPE html>


<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic To-Do List</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #e0f2fe, #f8fafc);
    margin: 0;
    padding: 0;
}

.container {
    width: 420px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

.desc {
    text-align: center;
    font-size: 14px;
    color: gray;
}

.input-area {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 15px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #f1f5f9;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.task-buttons button {
    margin-left: 5px;
    background: #10b981;
}

.task-buttons button.delete {
    background: #ef4444;
}

.counter {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>📝 Dynamic To-Do List</h1>

    <p class="desc">
        Add, edit, delete, and mark tasks as completed dynamically.
    </p>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="counter">
        Completed: <span id="completed">0</span> |
        Pending: <span id="pending">0</span>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") {
        alert("Task cannot be empty!");
        return;
    }

    let li = document.createElement("li");

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.onchange = function () {
        li.classList.toggle("completed");
        updateCounter();
    };

    let span = document.createElement("span");
    span.innerText = taskText;

    let btnDiv = document.createElement("div");
    btnDiv.className = "task-buttons";

    let editBtn = document.createElement("button");
    editBtn.innerText = "Edit";
    editBtn.onclick = function () {
        let newText = prompt("Edit task:", span.innerText);
        if (newText !== null && newText.trim() !== "") {
            span.innerText = newText;
        }
    };

    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.className = "delete";
    deleteBtn.onclick = function () {
        li.remove();
        updateCounter();
    };

    btnDiv.appendChild(editBtn);
    btnDiv.appendChild(deleteBtn);

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(btnDiv);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
    updateCounter();
}

function updateCounter() {
    let tasks = document.querySelectorAll("#taskList li");
    let completed = document.querySelectorAll("#taskList li.completed");

    document.getElementById("completed").innerText = completed.length;
    document.getElementById("pending").innerText = tasks.length - completed.length;
}
</script>

</body>
</html>
