
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Quiz</title>

<style>

/* ===== PAGE STYLE ===== */
body{
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

.question{
    font-size:18px;
    margin-bottom:15px;
}

.option{
    margin:8px 0;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#1f3c88;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#162c66;
}

#result{
    text-align:center;
    font-size:18px;
    margin-top:15px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>Interactive Quiz</h1>

<p>Test your basic programming knowledge!</p>

<div id="quiz">

<div class="question" id="question"></div>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

<div id="result" class="hidden"></div>

<button id="restartBtn" class="hidden" onclick="restartQuiz()">Restart Quiz</button>

</div>

<script>

/* ===== QUIZ DATA ===== */
const quizData = [
{
question:"Which language runs in a web browser?",
options:["Python","Java","C++","JavaScript"],
answer:"JavaScript"
},
{
question:"HTML stands for?",
options:[
"Hyper Trainer Marking Language",
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Transfer Markup Level"
],
answer:"Hyper Text Markup Language"
},
{
question:"CSS is used for?",
options:[
"Database Management",
"Page Styling",
"Server Programming",
"Operating System"
],
answer:"Page Styling"
}
];

let currentQuestion = 0;
let score = 0;

/* ===== LOAD QUESTION ===== */
function loadQuestion(){
const q = quizData[currentQuestion];
document.getElementById("question").innerText = q.question;

const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";

q.options.forEach(option=>{
const label = document.createElement("label");
label.classList.add("option");

label.innerHTML =
`<input type="radio" name="answer" value="${option}"> ${option}`;

optionsDiv.appendChild(label);
});
}

/* ===== NEXT QUESTION ===== */
function nextQuestion(){

const selected =
document.querySelector('input[name="answer"]:checked');

if(!selected){
alert("Please select an option!");
return;
}

if(selected.value === quizData[currentQuestion].answer){
score++;
}

currentQuestion++;

if(currentQuestion < quizData.length){
loadQuestion();
}
else{
showResult();
}
}

/* ===== RESULT DISPLAY ===== */
function showResult(){

document.getElementById("quiz").classList.add("hidden");

let message="";

if(score===quizData.length)
message="Excellent!";
else if(score>=2)
message="Good Job!";
else
message="Try Again!";

const resultDiv=document.getElementById("result");
resultDiv.classList.remove("hidden");

resultDiv.innerHTML=
`Your Score: ${score}/${quizData.length}<br>${message}`;

document.getElementById("restartBtn")
.classList.remove("hidden");
}

/* ===== RESTART QUIZ ===== */
function restartQuiz(){
currentQuestion=0;
score=0;

document.getElementById("quiz").classList.remove("hidden");
document.getElementById("result").classList.add("hidden");
document.getElementById("restartBtn").classList.add("hidden");

loadQuestion();
}

/* START QUIZ */
loadQuestion();

</script>

</body>
</html>
