{% extends "base.html" %}
{% block content %}

<h2>Contacts</h2>

<form method="GET">
<input name="search" placeholder="Search by name or phone">
<button>Search</button>
</form>

<table>
<tr>
<th>Name</th><th>Phone</th><th>Email</th><th>Action</th>
</tr>

{% for c in contacts %}
<tr>
<td>{{c.name}}</td>
<td>{{c.phone}}</td>
<td>{{c.email}}</td>
<td>
<a href="/edit/{{c.id}}">Edit</a>
<a href="/delete/{{c.id}}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
