{% extends "base.html" %}

{% block content %}
<h1>Blog Posts</h1>

{% for post in posts %}
<div class="card">
<h2>{{ post.title }}</h2>
<p>{{ post.content }}</p>

<a href="{{ url_for('edit', id=post.id) }}">Edit</a>
<a href="{{ url_for('delete', id=post.id) }}">Delete</a>
</div>
{% endfor %}

{% if not posts %}
<p>No posts available.</p>
{% endif %}

{% endblock %}
